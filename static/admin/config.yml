# Decap CMS 配置 - JowJow Work 博客后台
# 文档: https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: LeonJow/jowjowork.uno
  branch: main

# 本地开发模式（无需 GitHub OAuth）
local_backend: true

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: https://jowjowork.shop
display_url: https://jowjowork.shop

locale: 'zh_Hans'

collections:
  # ============================================
  # 📝 文章管理
  # ============================================
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "content/posts"
    create: true
    extension: md
    format: frontmatter
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title"]
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        pattern: ['.{2,}', "标题至少2个字符"]
      - label: "发布日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DDTHH:mm:ssZ"
      - label: "分类"
        name: "categories"
        widget: "select"
        options: ["技术", "生活", "项目", "随笔"]
        multiple: false
        default: ["技术"]
      - label: "标签"
        name: "tags"
        widget: "list"
        hint: "按回车添加标签"
        field:
          label: 标签
          name: tag
          widget: string
      - label: "正文"
        name: "body"
        widget: "markdown"
        minimal: false
        buttons:
          - bold
          - italic
          - code
          - link
          - bulleted-list
          - numbered-list
          - quote

  # ============================================
  # 👤 关于页面
  # ============================================
  - name: "about"
    label: "关于页面"
    folder: "content/about"
    create: false
    delete: false
    extension: md
    format: frontmatter
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "正文"
        name: "body"
        widget: "markdown"

  # ============================================
  # ⚙️ 站点设置
  # ============================================
  - name: "config"
    label: "站点设置"
    files:
      - name: "general"
        label: "基本设置"
        file: "hugo.yaml"
        fields:
          - label: "网站标题"
            name: "title"
            widget: "string"
          - label: "网站描述"
            name: "params.description"
            widget: "text"
          - label: "主页标题"
            name: "params.homeInfoParams.Title"
            widget: "string"
          - label: "主页描述"
            name: "params.homeInfoParams.Content"
            widget: "text"
          - label: "作者名"
            name: "params.author"
            widget: "string"
