{{- define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{- if .Description }}
  <div class="post-description">{{ .Description }}</div>
  {{- end }}
</header>

<article class="cooperation-page">
  {{ .Content }}
</article>

<style>
.cooperation-page {
  max-width: 720px;
  margin: 0 auto;
}
.cooperation-page a {
  color: var(--link-color, #7c3aed);
  text-decoration: underline;
  text-underline-offset: 2px;
}
</style>
{{- end }}
