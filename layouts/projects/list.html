{{- define "main" }}
<header class="page-header">
  <h1>项目</h1>
  <div class="post-description">我的项目作品集</div>
</header>

<style>
.page-header h1 + .post-description { margin-top: 4px; }
</style>

<div class="projects-grid">
{{- range $.Site.Data.projects }}
  <div class="project-card">
    {{- if .tags }}
    <div class="project-tags">
      {{- range .tags }}
      <span class="project-tag">{{ . }}</span>
      {{- end }}
    </div>
    {{- end }}
    <h3>{{ .title }}</h3>
    <p>{{ .description }}</p>
    {{- if .url }}
    <a href="{{ .url }}" class="project-link" target="_blank" rel="noopener">查看项目 →</a>
    {{- end }}
  </div>
{{- else }}
  <p style="color:var(--secondary,#999)">暂无项目，请在 data/projects.yaml 中添加。</p>
{{- end }}
</div>

<style>
.projects-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 24px;
}
.project-card {
  background: var(--entry,#1a1a2e); border: 1px solid var(--border,#2d2d4f); border-radius: 12px;
  padding: 20px; transition: transform .2s,box-shadow .2s;
}
.project-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124,58,237,.15); border-color: #7c3aed; }
.project-card h3 { margin: 0 0 8px; font-size: 1.15em; }
.project-card p { margin: 0 0 12px; color: var(--secondary,#999); font-size: .9em; line-height: 1.5; }
.project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.project-tag { font-size: .75em; padding: 2px 8px; border-radius: 4px; background: rgba(124,58,237,.12); color: #7c3aed; }
.project-link { color: #7c3aed; font-size: .85em; text-decoration: underline; text-underline-offset: 2px; }
</style>
{{- end }}
